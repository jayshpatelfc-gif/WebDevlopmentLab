<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Of Numbers</title>
</head>
<body>
    <h2>The Sum Of Two Numbers</h2>
    <p>Enter The First Number:</p>
    <input name="namb" id="nms" placeholder="Enter 1 Number..">
    <p>Enter The Second Number:</p>
    <input name="numa" id="nmc" placeholder="Enter 2 Number.."><br>
    <button onclick="sumThem()">Submit Here</button>

    <script>
        function sumThem(){  
            let as = parseFloat(document.getElementById("nms").value);
            let bs = parseFloat(document.getElementById("nmc").value);
            alert(as + bs);
        }
    </script>
</body>
</html>
