<!DOCTYPE html>
<html>
<head>
  <title>Food Calories Table</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-4">
    <h2>Food Contents and Calories</h2>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Food Item</th>
          <th>Calories</th>
        </tr>
      </thead>
      <tbody>
        <tr class="table-success">
          <td>Apple</td>
          <td>95</td>
        </tr>
        <tr class="table-success">
          <td>Grilled Chicken Breast (100g)</td>
          <td>165</td>
        </tr>
        <tr class="table-info">
          <td>Veggie Sandwich</td>
          <td>350</td>
        </tr>
        <tr class="table-info">
          <td>Cheese Pizza Slice</td>
          <td>680</td>
        </tr>
        <tr class="table-warning">
          <td>Double Cheeseburger</td>
          <td>950</td>
        </tr>
        <tr class="table-danger">
          <td>Chocolate Milkshake (Large)</td>
          <td>1350</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
