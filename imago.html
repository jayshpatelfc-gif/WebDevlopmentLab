<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Responsive Images</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .responsive-img {
      display: none;
      width: 100%;
      height: auto;
    }
    @media (max-width: 576px) {
      #img1 { display: block; }
    }
    @media (min-width: 577px) and (max-width: 768px) {
      #img2 { display: block; }
    }
    @media (min-width: 769px) and (max-width: 992px) {
      #img3 { display: block; }
    }
    @media (min-width: 993px) {
      #img4 { display: block; }
    }
  </style>
</head>
<body class="container text-center mt-5">
  <h2>Resize the browser to see images change</h2>
  <img id="img1" class="responsive-img img-fluid" src="img1.jpg" alt="Image 1">
  <img id="img2" class="responsive-img img-fluid" src="img2.jpg" alt="Image 2">
  <img id="img3" class="responsive-img img-fluid" src="img3.jpg" alt="Image 3">
  <img id="img4" class="responsive-img img-fluid" src="img4.jpg" alt="Image 4">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
