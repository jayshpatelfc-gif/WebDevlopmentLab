<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Properties</title>
    <style>
        .p1{
            margin-top: 3cm;
            margin-bottom: 5cm;
            margin-left: 2cm;
        }
        .p2{
            margin-top: 3cm;
            margin-bottom: 5cm;
            margin-left: 2cm;
        }
        .p3{
            margin-top: 25%;
        }
    </style>
</head>
<body>
    <p class="p1">Hello this Is The Massive World</p1><br>
    <p class="p2">I love Only Web Devlopment</p2><br>
    <p class="p3">WebDevlopments Has JS,PHP,HTML,CSS,ETC</p3><br>
</body>
</html>
